<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>NOOD.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="NOOD." />

  <style>
    * { box-sizing: border-box; }

    :root{
      --bg: #000;
      --text: #fff;
      --muted: rgba(255,255,255,0.72);
      --muted2: rgba(255,255,255,0.55);
      --card: rgba(0,0,0,0.55);
      --cardHover: rgba(0,0,0,0.68);
      --stroke: rgba(255,255,255,0.16);
      --strokeHover: rgba(255,255,255,0.28);
      --shadow: 0 10px 28px rgba(0,0,0,0.45);
      --radius: 18px;
    }

    body{
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      text-align: center;
    }

    body::before{
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.78)),
        url("bg.png");
      background-size: cover;
      background-position: center;
      filter: contrast(1.2) brightness(0.65);
      z-index: 0;
    }

    .wrap{
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      padding: 28px 18px 22px;
    }

    h1{
      font-size: clamp(56px, 14vw, 92px);
      margin: 0 0 18px;
      line-height: 1;
      letter-spacing: -0.06em;
    }

    .buttons{
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 16px 0 18px;
    }

    .link-btn{
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 12px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .link-btn:hover{
      background: var(--cardHover);
      border-color: var(--strokeHover);
      transform: translateY(-1px);
    }

    .cover{
      width: 44px;
      height: 44px;
      border-radius: 12px;
      overflow: hidden;
      flex: 0 0 44px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.06);
    }

    .cover img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .btn-text{
      text-align: left;
      flex: 1 1 auto;
      min-width: 0;
    }

    .btn-title{
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-sub{
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .play,
    .redirect,
    .dropdown{
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
    }

    .link-btn:hover .play,
    .link-btn:hover .redirect,
    .link-btn:hover .dropdown{
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.30);
    }

    .play:active,
    .redirect:active,
    .dropdown:active{
      transform: scale(0.98);
    }

    .play svg,
    .redirect svg,
    .dropdown svg{
      width: 18px;
      height: 18px;
      display: block;
      opacity: 0.95;
    }

    .ep-tracks{
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
      padding-left: 10px;
    }

    .ep-open .ep-tracks{
      display: flex;
    }

    .track-row{
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(0,0,0,0.42);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 22px rgba(0,0,0,0.35);
    }

    .track-row:hover{
      background: rgba(0,0,0,0.55);
      border-color: rgba(255,255,255,0.20);
      transform: translateY(-1px);
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    }

    .track-title{
      display: inline-block;
      text-decoration: none;
      color: #fff;
      opacity: 0.95;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-title:hover{ opacity: 1; }

    .ep-open .dropdown svg{
      transform: rotate(180deg);
    }

    .social{
      margin-top: 18px;
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
    }

    .social a{
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      opacity: 0.65;
      transition: opacity 120ms ease, transform 120ms ease;
      text-decoration: none;
    }

    .social a:hover{
      opacity: 1;
      transform: translateY(-1px);
    }

    .social img{
      width: 22px;
      height: 22px;
      display: block;
      object-fit: contain;
      filter: invert(1);
    }

    @media (prefers-reduced-motion: reduce){
      .link-btn, .play, .redirect, .dropdown, .dropdown svg, .social a{ transition: none; }
      .track-row{ transition: none !important; }
    }
  </style>
</head>

  <script>
    (function () {
      const cards = Array.from(document.querySelectorAll(".link-btn"));
      const audio = new Audio();
      audio.preload = "none";

      let activeEl = null;

      function setPlayIcon(btn) {
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M8 5.5v13l11-6.5L8 5.5z" fill="currentColor"/>
          </svg>
        `;
      }

      function setPauseIcon(btn) {
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 6.5h3v11H7v-11zm7 0h3v11h-3v-11z" fill="currentColor"/>
          </svg>
        `;
      }

      function resetAllPlayButtons() {
        document.querySelectorAll(".play").forEach((btn) => setPlayIcon(btn));
      }

      function stopPreview() {
        audio.pause();
        audio.currentTime = 0;
        activeEl = null;
        resetAllPlayButtons();
      }

      audio.addEventListener("ended", stopPreview);

      audio.addEventListener("error", () => {
        resetAllPlayButtons();
        activeEl = null;
      });

      cards.forEach((card) => {
        const playBtn = card.querySelector(".play");
        const src = card.getAttribute("data-audio");

        if (!playBtn) return;

        playBtn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();

          if (!src) return;

          const isSame = activeEl === card;
          const isPlaying = !audio.paused && isSame;

          if (isPlaying) {
            stopPreview();
            return;
          }

          resetAllPlayButtons();
          activeEl = card;
          audio.src = src;
          audio.currentTime = 0;

          audio.play()
            .then(() => setPauseIcon(playBtn))
            .catch(() => {
              setPlayIcon(playBtn);
              activeEl = null;
            });
        });

        const cover = card.querySelector(".cover");
        if (cover && src) {
          cover.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            playBtn.click();
          });
        }
      });

      const epRoot = document.getElementById("ep-lvg");
      if (epRoot) {
        const toggleBtn = epRoot.querySelector(".dropdown");

        if (toggleBtn) {
          toggleBtn.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();

            const isOpen = epRoot.classList.toggle("ep-open");
            toggleBtn.setAttribute("aria-expanded", String(isOpen));
          });
        }

        epRoot.querySelectorAll(".track-row").forEach((row) => {
          const playBtn = row.querySelector(".play");
          const src = row.getAttribute("data-audio");

          if (!playBtn) return;

          playBtn.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();

            if (!src) return;

            const isSame = activeEl === row;
            const isPlaying = !audio.paused && isSame;

            if (isPlaying) {
              stopPreview();
              return;
            }

            resetAllPlayButtons();
            activeEl = row;
            audio.src = src;
            audio.currentTime = 0;

            audio.play()
              .then(() => setPauseIcon(playBtn))
              .catch(() => {
                setPlayIcon(playBtn);
                activeEl = null;
              });
          });

          const cover = row.querySelector(".cover");
          if (cover) {
            cover.addEventListener("click", (e) => {
              e.preventDefault();
              e.stopPropagation();
              playBtn.click();
            });
          }
        });
      }

      document.addEventListener("click", (e) => {
        const clickedPlay = e.target.closest(".play");
        if (!clickedPlay && activeEl) stopPreview();
      });
    })();
  </script>
