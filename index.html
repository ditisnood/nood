  <style>
    * { box-sizing: border-box; }

    :root{
      --bg: #000;
      --text: #fff;
      --muted: rgba(255,255,255,0.72);
      --muted2: rgba(255,255,255,0.55);
      --card: rgba(0,0,0,0.55);
      --cardHover: rgba(0,0,0,0.68);
      --stroke: rgba(255,255,255,0.16);
      --strokeHover: rgba(255,255,255,0.28);
      --shadow: 0 10px 28px rgba(0,0,0,0.45);
      --radius: 18px;
    }

    body{
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      text-align: center;
    }

    body::before{
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.78)),
        url("bg.png");
      background-size: cover;
      background-position: center;
      filter: contrast(1.2) brightness(0.65);
      z-index: 0;
    }

    .wrap{
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      padding: 28px 18px 22px;
    }

    h1{
      font-size: clamp(56px, 14vw, 92px);
      margin: 0 0 18px;
      line-height: 1;
      letter-spacing: -0.06em;
    }

    .buttons{
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 16px 0 18px;
    }

    /* Linktree-like button */
    .link-btn{
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 12px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .link-btn:hover{
      background: var(--cardHover);
      border-color: var(--strokeHover);
      transform: translateY(-1px);
    }

    .cover{
      width: 44px;
      height: 44px;
      border-radius: 12px;
      overflow: hidden;
      flex: 0 0 44px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.06);
    }

    .cover img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .btn-text{
      text-align: left;
      flex: 1 1 auto;
      min-width: 0;
    }

    .btn-title{
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-sub{
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .play{
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
    }

    .link-btn:hover .play{
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.30);
    }

    .play:active{
      transform: scale(0.98);
    }

    .play svg{
      width: 18px;
      height: 18px;
      display: block;
      opacity: 0.95;
    }

    .status{
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted2);
      min-height: 16px;
    }

    .links{
      margin-top: 18px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 14px;
    }

    .links a{
      color: #fff;
      text-decoration: none;
      opacity: 0.65;
      transition: opacity 120ms ease;
    }

    .links a:hover{ opacity: 1; }

    /* Optional: reduce motion */
    @media (prefers-reduced-motion: reduce){
      .link-btn, .play{ transition: none; }
    }
  </style>
</head>

  <script>
    (function () {
      const cards = Array.from(document.querySelectorAll(".link-btn"));

      // One shared audio instance so only one preview can play at once
      const audio = new Audio();
      audio.preload = "none";

      let activeCard = null;
      }

      function setPlayIcon(btn) {
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M8 5.5v13l11-6.5L8 5.5z" fill="currentColor"/>
          </svg>
        `;
      }

      function setPauseIcon(btn) {
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 6.5h3v11H7v-11zm7 0h3v11h-3v-11z" fill="currentColor"/>
          </svg>
        `;
      }

      function resetAllButtons() {
        cards.forEach(card => {
          const btn = card.querySelector(".play");
          if (btn) setPlayIcon(btn);
        });
      }

      function stopPreview() {
        audio.pause();
        audio.currentTime = 0;
        activeCard = null;
        resetAllButtons();
        setStatus("");
      }

      audio.addEventListener("ended", () => {
        stopPreview();
      });

      audio.addEventListener("error", () => {
        resetAllButtons();
        setStatus("Preview kan niet laden. Check of het audiobestand naast je HTML staat en de bestandsnaam klopt.");
        activeCard = null;
      });

      cards.forEach(card => {
        const playBtn = card.querySelector(".play");
        const title = card.getAttribute("data-title") || "Track";
        const src = card.getAttribute("data-audio");

        // Preview only when clicking the play button (not the whole card)
        playBtn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();

          if (!src) {
            setStatus("Geen audio pad gevonden voor preview.");
            return;
          }

          const isSame = activeCard === card;
          const isPlaying = !audio.paused && isSame;

          if (isPlaying) {
            stopPreview();
            return;
          }

          // Switching tracks or starting fresh
          resetAllButtons();
          activeCard = card;
          audio.src = src;
          audio.currentTime = 0;

          audio.play()
            .then(() => {
              setPauseIcon(playBtn);
              setStatus(`Preview: ${title}`);
            })
            .catch(() => {
              setPlayIcon(playBtn);
              setStatus("Autoplay geblokkeerd. Klik nog een keer op preview.");
              activeCard = null;
            });
        });

        // If user clicks the cover image, also preview (optional)
        const cover = card.querySelector(".cover");
        cover.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          playBtn.click();
        });
      });

      // Stop preview when user clicks outside the buttons area
      document.addEventListener("click", (e) => {
        const clickedInside = e.target.closest(".link-btn");
        if (!clickedInside && activeCard) stopPreview();
      });
    })();
  </script>
