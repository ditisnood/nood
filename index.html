<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>NOOD.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="NOOD." />

  <style>
    * { box-sizing: border-box; }

    :root{
      --bg: #000;
      --text: #fff;
      --muted: rgba(255,255,255,0.72);
      --muted2: rgba(255,255,255,0.55);
      --card: rgba(0,0,0,0.55);
      --cardHover: rgba(0,0,0,0.68);
      --stroke: rgba(255,255,255,0.16);
      --strokeHover: rgba(255,255,255,0.28);
      --shadow: 0 10px 28px rgba(0,0,0,0.45);
      --radius: 18px;
    }

    body{
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      text-align: center;
    }

    body::before{
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.78)),
        url("bg.png");
      background-size: cover;
      background-position: center;
      filter: contrast(1.2) brightness(0.65);
      z-index: 0;
    }

    .wrap{
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      padding: 28px 18px 22px;
    }

    h1{
      font-size: clamp(56px, 14vw, 92px);
      margin: 0 0 18px;
      line-height: 1;
      letter-spacing: -0.06em;
    }

    .buttons{
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 16px 0 18px;
    }

    .link-btn{
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 12px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .link-btn:hover{
      background: var(--cardHover);
      border-color: var(--strokeHover);
      transform: translateY(-1px);
    }

    .cover{
      width: 44px;
      height: 44px;
      border-radius: 12px;
      overflow: hidden;
      flex: 0 0 44px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.06);
    }

    .cover img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .btn-text{
      text-align: left;
      flex: 1 1 auto;
      min-width: 0;
    }

    .btn-title{
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-sub{
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .play,
    .redirect,
    .dropdown{
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
    }

    .link-btn:hover .play,
    .link-btn:hover .redirect,
    .link-btn:hover .dropdown{
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.30);
    }

    .play:active,
    .redirect:active,
    .dropdown:active{
      transform: scale(0.98);
    }

    .play svg,
    .redirect svg,
    .dropdown svg{
      width: 18px;
      height: 18px;
      display: block;
      opacity: 0.95;
    }

    .ep-tracks{
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
      padding-left: 10px;
    }

    .ep-open .ep-tracks{
      display: flex;
    }

    .track-row{
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(0,0,0,0.42);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 22px rgba(0,0,0,0.35);
    }

    .track-row:hover{
      background: rgba(0,0,0,0.55);
      border-color: rgba(255,255,255,0.20);
      transform: translateY(-1px);
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    }

    .track-title{
      display: inline-block;
      text-decoration: none;
      color: #fff;
      opacity: 0.95;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-title:hover{ opacity: 1; }

    .ep-open .dropdown svg{
      transform: rotate(180deg);
    }

    .social{
      margin-top: 18px;
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
    }

    .social a{
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      opacity: 0.65;
      transition: opacity 120ms ease, transform 120ms ease;
      text-decoration: none;
    }

    .social a:hover{
      opacity: 1;
      transform: translateY(-1px);
    }

    .social img{
      width: 22px;
      height: 22px;
      display: block;
      object-fit: contain;
      filter: invert(1);
    }

  </style>
</head>

<body>
  <main class="wrap">
    <h1>NOOD.</h1>

    <div class="buttons">

      <!-- Carriere Maken -->
      <a
        class="link-btn"
        href="https://open.spotify.com/track/2jDvx9wURXgVLMWEOftTcD?si=daf1ccbba4614050"
        target="_blank"
        rel="noopener"
        data-audio="Nood - Carriere Maken.wav"
        data-title="Carriere Maken"
      >
        <span class="cover">
          <img
            src="https://s3.amazonaws.com/gather.fandalism.com/800x800%2D1215624%2D%2D2F9BE2C7%2D8C96%2D4B10%2DB8013F3458B74F2F%2D%2D0%2D%2D13088280%2D%2DCarriereMaken.jpg"
            alt="Carriere Maken cover"
          />
        </span>

        <span class="btn-text">
          <span class="btn-title">Luister Carriere Maken</span>
        </span>

        <button class="play" type="button">
          <svg viewBox="0 0 24 24">
            <path d="M8 5.5v13l11-6.5L8 5.5z" fill="currentColor"/>
          </svg>
        </button>
      </a>

      <!-- Dans Met Me -->
      <a
        class="link-btn"
        href="https://open.spotify.com/track/4s8exxVAC4KRfGa17iS7uL?si=5343b91b005f49bf"
        target="_blank"
        rel="noopener"
        data-audio="DansMetMeFINAL.mp3"
        data-title="Dans Met Me"
      >
        <span class="cover">
          <img src="https://s3.amazonaws.com/gather.fandalism.com/800x800%2D1215624%2D%2D26323659%2DD20A%2D4759%2DBA572A27F7F330B1%2D%2D0%2D%2D7737359%2D%2DDansMetMe.jpg"/>
        </span>

        <span class="btn-text">
          <span class="btn-title">Luister Dans Met Me</span>
        </span>

        <button class="play" type="button">
          <svg viewBox="0 0 24 24">
            <path d="M8 5.5v13l11-6.5L8 5.5z" fill="currentColor"/>
          </svg>
        </button>
      </a>

      <!-- Kom Verder -->
      <a
        class="link-btn"
        href="https://open.spotify.com/track/4ee5AJoY7JTXerpsyGfZRy?si=2684e64672784895"
        target="_blank"
        rel="noopener"
        data-audio="NoodwnrikffdraaibenjewegFINAL.mp3"
        data-title="Kom Verder"
      >
        <span class="cover">
          <img src="https://s3.amazonaws.com/gather.fandalism.com/800x800%2D1215624%2D%2DE8D46418%2D3ADD%2D4BAB%2DBC7482F1402DA03B%2D%2D0%2D%2D14096792%2D%2DKomVerderfinalcovernotext.jpg"/>
        </span>

        <span class="btn-text">
          <span class="btn-title">Luister Kom Verder</span>
        </span>

        <button class="play" type="button">
          <svg viewBox="0 0 24 24">
            <path d="M8 5.5v13l11-6.5L8 5.5z" fill="currentColor"/>
          </svg>
        </button>
      </a>

    </div>

    <div class="social">
      <a href="https://open.spotify.com/artist/7EHcdzlNlWqJKebwifLjZg?si=WSA-HqejSeCdrnXwaQ425g"><img src="spotify.svg"></a>
      <a href="https://www.instagram.com/ditisnood/"><img src="instagram.svg"></a>
      <a href="https://www.tiktok.com/@ditisnood"><img src="tiktok.svg"></a>
      <a href="https://www.youtube.com/@noodzakelijk"><img src="youtube.svg"></a>
      <a href="https://soundcloud.com/noodzakelijk"><img src="soundcloud-brands-solid-full.svg"></a>
    </div>
  </main>

<script>
(function () {

const cards = Array.from(document.querySelectorAll(".link-btn"))
const audio = new Audio()

let activeEl = null

function setPlayIcon(btn){
btn.innerHTML=`<svg viewBox="0 0 24 24"><path d="M8 5.5v13l11-6.5L8 5.5z" fill="currentColor"/></svg>`
}

function setPauseIcon(btn){
btn.innerHTML=`<svg viewBox="0 0 24 24"><path d="M7 6.5h3v11H7v-11zm7 0h3v11h-3v-11z" fill="currentColor"/></svg>`
}

function resetAll(){
document.querySelectorAll(".play").forEach(setPlayIcon)
}

function stop(){
audio.pause()
audio.currentTime=0
activeEl=null
resetAll()
}

audio.addEventListener("ended",stop)

cards.forEach(card=>{
const playBtn=card.querySelector(".play")
const src=card.getAttribute("data-audio")

if(!playBtn)return

playBtn.addEventListener("click",e=>{

e.preventDefault()
e.stopPropagation()

if(!src)return

const isSame=activeEl===card
const isPlaying=!audio.paused && isSame

if(isPlaying){
stop()
return
}

resetAll()

activeEl=card
audio.src=src
audio.currentTime=0

audio.play().then(()=>{
setPauseIcon(playBtn)
}).catch(()=>{
setPlayIcon(playBtn)
activeEl=null
})

})

})

})()
</script>

</body>
</html>
